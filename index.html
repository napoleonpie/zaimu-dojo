<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>財務道場 AIトレーナー</title>

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #eef3ff, #f8fafc);
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .dojo {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .top {
      display: flex;
      gap: 22px;
      align-items: center;
    }

    #trainerImage {
      width: 210px;
      border-radius: 18px;
      background: #eee;
      object-fit: contain;
    }

    .status {
      flex: 1;
    }

    .status h1 {
      font-size: 38px;
      margin: 0 0 14px;
    }

    .status-card {
      background: #f7f9ff;
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 10px;
    }

    .status p {
      font-size: 17px;
      margin: 6px 0;
    }

    .exp-bar {
      width: 100%;
      height: 16px;
      background: #ddd;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .exp-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #22c55e);
      transition: width 0.4s;
    }

    .mode-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
    }

    .basic {
      background: #2563eb;
    }

    .advanced {
      background: #c0392b;
    }

    .question {
      margin-top: 24px;
      padding: 16px;
      background: #eef3ff;
      border-radius: 14px;
      font-size: 17px;
      line-height: 1.7;
    }

    .hint-box {
      background: #fff8dc;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 12px;
    }

    textarea {
      width: 100%;
      height: 140px;
      margin-top: 16px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #bbb;
    }

    button {
      margin-top: 16px;
      margin-right: 8px;
      padding: 13px 24px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      padding: 18px;
      background: #f7f7f7;
      border-radius: 14px;
      line-height: 1.7;
      font-size: 16px;
      white-space: normal;
    }

    .result h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .result h3 {
      margin: 22px 0 8px;
      font-size: 18px;
    }

    .result p {
      margin: 8px 0;
      line-height: 1.7;
    }

    .result ul {
      margin: 8px 0 12px 22px;
      padding: 0;
    }

    .result li {
      margin-bottom: 10px;
      line-height: 1.7;
    }

    .red-example {
      color: #c0392b;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      font-weight: bold;
    }

    .levelup {
      background: #fff7ed;
      border: 2px solid #f97316;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .teach-box {
      background: #ecfdf5;
      border-left: 5px solid #16a085;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .dojo {
        padding: 14px;
      }

      .top {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      #trainerImage {
        width: 130px;
        max-height: 190px;
      }

      .status h1 {
        font-size: 30px;
        margin: 8px 0 12px;
      }

      .status p {
        font-size: 15px;
      }

      .question {
        font-size: 15px;
        padding: 14px;
      }

      textarea {
        height: 120px;
      }

      button {
        width: 100%;
        margin-right: 0;
        margin-top: 10px;
      }

      .result {
        font-size: 15px;
        padding: 14px;
      }
    }
.category-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.category-buttons button {
  background: #334155;
  padding: 9px 14px;
  font-size: 14px;
  margin: 0;
}

.category-buttons button:hover {
  background: #0f172a;
}

.title-flavor {
  color: #7c3aed;
  font-weight: bold;
}
  
  </style>
</head>

<body>
  <div class="dojo">
    <div class="top">
      <img id="trainerImage" src="img/trainer_normal.png" alt="トレーナー画像">

      <div class="status">
        <h1>財務道場</h1>

        <div class="status-card">
          <p>レベル：<span id="level">1</span></p>
          <p>経験値：<span id="exp">0</span> / 100</p>
          <div class="exp-bar">
            <div class="exp-fill" id="expFill"></div>
          </div>
          <p>称号：<span id="title">見習い財務部員</span></p>
        </div>
      </div>
    </div>

    <div class="question" id="question">AIが問題を生成中です...</div>

<div class="category-buttons">
  <button onclick="nextQuestion('random')">ランダム</button>
  <button onclick="nextQuestion('basic')">基礎</button>
  <button onclick="nextQuestion('advanced')">応用</button>
  <button onclick="nextQuestion('performance_debt')">業績・借入状況</button>
  <button onclick="nextQuestion('rates_macro')">金利・経済</button>
</div>

<textarea id="answer" placeholder="ここに回答を入力してください"></textarea>

    <button onclick="gradeAnswer()">採点する</button>
    <button onclick="nextQuestion()">次の問題</button>

    <div class="result" id="result">回答すると、ここに採点結果が表示されます。</div>
  </div>

  <script>

];

let title = titles[0].name;

for (const t of titles) {
  if (level >= t.level) {
    title = t.name;
  }
}

const bonusTitles = [
  "本日の肩書き：支払予定表の守護者",
  "本日の肩書き：銀行員の眉間を読む者",
  "本日の肩書き：金利上昇局面のサバイバー",
  "本日の肩書き：BSの森を歩く者",
  "本日の肩書き：PLとCFの通訳者",
  "本日の肩書き：借入一覧の整理整頓係長",
  "本日の肩書き：数字で語る練習生",
  "本日の肩書き：自己資本比率をそっと見守る者",
  "本日の肩書き：担保余力の観察者",
  "本日の肩書き：銀行面談で汗をかきながら成長する男"
];

const todayIndex = new Date().getDate() % bonusTitles.length;

document.getElementById("title").innerHTML =
  `${title}<br><span class="title-flavor">${bonusTitles[todayIndex]}</span>`;

      document.getElementById("title").textContent = title;

      localStorage.setItem("exp", exp);
      localStorage.setItem("level", level);
    }

    function difficultyMultiplier(difficultyLevel) {
      const lv = Number(difficultyLevel) || 3;
      if (lv <= 1) return 1.0;
      if (lv === 2) return 1.2;
      if (lv === 3) return 1.4;
      if (lv === 4) return 1.7;
      return 2.0;
    }

    async function showQuestion(type = "random") {
  document.getElementById("question").textContent =
    "AIが問題を生成中です...";

  document.getElementById("trainerImage").src =
    "img/trainer_normal.png";

  try {
    const response = await fetch(
      `https://zaimu-dojo.vercel.app/api/question?type=${type}`
    );

    const data = await response.json();
    currentQuestion = data;

    const modeLabels = {
      basic: "基礎問題",
      advanced: "応用問題",
      performance_debt: "業績・借入状況",
      rates_macro: "金利・経済",
      random: "ランダム"
    };

    const modeLabel = modeLabels[data.mode] || modeLabels[type] || "ランダム";
    const modeClass = data.mode === "advanced" ? "advanced" : "basic";

    document.getElementById("question").innerHTML =
      `
      <span class="mode-badge ${modeClass}">${modeLabel}</span>

      <div style="margin-bottom:10px;">
        <strong>カテゴリ：</strong>${data.category}
        &nbsp;&nbsp;
        <strong>難易度：</strong>${data.difficulty}
      </div>

      <div style="font-size:18px; margin-bottom:12px;">
        ${data.question}
      </div>

      <div class="hint-box">
        💡 ヒント：${data.hint}
      </div>
      `;

    document.getElementById("answer").value = "";
    document.getElementById("result").textContent =
      "回答すると、ここに採点結果が表示されます。";

  } catch (error) {
    document.getElementById("question").textContent =
      "問題生成エラー：" + error.message;
  }
}
    async function gradeAnswer() {
      const answer = document.getElementById("answer").value;

      if (!currentQuestion) {
        document.getElementById("result").textContent =
          "まだ問題が生成されていません。少し待ってください。";
        return;
      }

      if (answer.trim() === "") {
        document.getElementById("result").textContent =
          "まずは回答を書いてください。";
        return;
      }

      document.getElementById("result").textContent =
        "AIトレーナーが採点中です...";

      try {
        const response = await fetch(
          "https://zaimu-dojo.vercel.app/api/grade",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              question: currentQuestion.question,
              answer: answer
            })
          }
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "採点に失敗しました");
        }

        const score = Number(result.score) || 0;

        let image = "img/trainer_normal.png";
        if (score >= 90) {
          image = "img/trainer_great.png";
        } else if (score >= 75) {
          image = "img/trainer_good.png";
        } else if (score >= 55) {
          image = "img/trainer_soso.png";
        } else {
          image = "img/trainer_bad.png";
        }
        document.getElementById("trainerImage").src = image;

        const multiplier = difficultyMultiplier(currentQuestion.difficultyLevel);
        const gainedExp = Math.round((score / 5) * multiplier);

        exp += gainedExp;

        let levelUpMessage = "";

        while (exp >= 100) {
          level++;
          exp -= 100;
          levelUpMessage = `<div class="levelup">🎉 レベルアップ！ レベル${level}になりました！</div>`;
        }

        updateStatus();

        const goodPoints = Array.isArray(result.goodPoints) ? result.goodPoints : [];
        const improvements = Array.isArray(result.improvements) ? result.improvements : [];

        const goodPointsHtml = goodPoints.map(item => `<li>${item}</li>`).join("");

        const improvementsHtml = improvements.map(item => `
          <li>
            <strong>不足点：</strong>${item.point}<br>
            <span class="red-example">（例）${item.example}</span>
          </li>
        `).join("");

        document.getElementById("result").innerHTML = `
          ${levelUpMessage}

          <h2>スコア：${score}点 / 100点</h2>
          <p><strong>獲得EXP：</strong>${gainedExp} EXP</p>
          <p><strong>問題タイプ：</strong>${currentQuestion.mode === "advanced" ? "応用問題" : "基礎問題"}</p>
          <p><strong>難易度倍率：</strong>${multiplier}倍</p>

          <h3>■ TAKAさんの回答要約</h3>
          <p>${result.summary || ""}</p>

          <h3>■ 良かった点</h3>
          <ul>${goodPointsHtml}</ul>

          <h3>■ 改善点</h3>
          <ul>${improvementsHtml}</ul>

          <h3>■ 銀行員の本音</h3>
          <p>「${result.bankerIntent || ""}」</p>

          <h3>■ 模範回答</h3>
          <p>${result.modelAnswer || ""}</p>

          <h3>■ トレーナーからの一言</h3>
          <p>${result.trainerComment || ""}</p>

          <div class="teach-box">
            📘 今日の教え：${result.trainer_teach || ""}
          </div>
        `;

      } catch (error) {
        document.getElementById("result").textContent =
          "エラー詳細：\n" + error.message;
      }
    }

    function nextQuestion(type = "random") {
  showQuestion(type);
}

    updateStatus();
    showQuestion();
  </script>
</body>
</html>
